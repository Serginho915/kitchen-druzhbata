services:
  backend:
    container_name: kitchen-backend-prod
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    volumes:
      - ./backend/db.sqlite3:/app/db.sqlite3
    ports:
      - "8004:8000"
    environment:
      DEBUG: "0"
      SECRET_KEY: prod-secret-key-change-me
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
    restart: unless-stopped

  frontend:
    container_name: kitchen-frontend-prod
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    depends_on:
      - backend
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped
